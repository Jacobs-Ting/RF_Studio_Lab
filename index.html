<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF System Research Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button id="back-btn" class="icon-btn" style="display: none; font-size: 1.1rem; background: rgba(255,255,255,0.1); padding: 0.4rem 0.8rem; border-radius: 8px;">Back</button>
                    <h1 class="main-title" id="page-title">Research Studios</h1>
                </div>
                <button id="settings-btn" class="icon-btn" title="Configure Links" style="font-size: 1.1rem; background: rgba(255,255,255,0.1); padding: 0.4rem 0.8rem; border-radius: 8px;">Settings</button>
            </div>

            <h2 class="subtitle" id="page-subtitle">Select a research studio to view advanced simulation platforms.</h2>

            <p class="description" id="page-desc">
                Click on the studio folders below to explore independent interactive simulation web pages.
            </p>
        </header>

        <main class="grid-container" id="cards-container">
            <!-- Cards will be dynamically generated by JS to inject URLs -->
        </main>

        <footer>
            <p class="tip">Tip: Click on the bold titles above to open the respective simulation tools in a new tab.
            </p>
        </footer>
    </div>

    <!-- Modal for configuring URLs -->
    <div id="url-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configure Simulation URLs</h2>
                <button id="close-modal" class="icon-btn">&times;</button>
            </div>
            <form id="url-form">
                <!-- Inputs generated dynamically -->
            </form>
            <div class="modal-actions">
                <button type="button" id="save-urls" class="btn primary">Save Links</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
